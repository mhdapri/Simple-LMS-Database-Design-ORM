services:
  app:
    build: .
    container_name: lms-app2
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./code:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: lms-db2
    environment:
      - POSTGRES_DB=lms_db2
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
